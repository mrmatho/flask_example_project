<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="page-shell">
        <section class="card form-card">
            <h1>Edit Workout</h1>
            <form action="{{ url_for('edit_workout', workout_id=workout_id) }}" method="post" class="workout-form">
                <label for="date" class="req">Date</label>
                <input type="date" id="date" name="date" value="{{ workout.date }}" required>

                <label for="exercise" class="req">Exercise</label>
                <input type="text" id="exercise" name="exercise" value="{{ workout.exercise }}" required>

                <label for="sets" class="req">Sets</label>
                <input type="number" id="sets" name="sets" value="{{ workout.sets }}" required>

                <label for="reps" class="req">Reps</label>
                <input type="number" id="reps" name="reps" value="{{ workout.reps }}" required>

                <label for="weight">Weight (kgs)</label>
                <input type="number" id="weight" name="weight" value="{{ workout.weight }}">

                <label for="time">Time (minutes)</label>
                <input type="number" id="time" name="time" value="{{ workout.time }}">

                <div class="actions form-actions">
                    <input type="submit" value="Save Changes">
                    <button type="button" class="secondary" onclick="window.location.href='/'">
                        Cancel
                    </button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
