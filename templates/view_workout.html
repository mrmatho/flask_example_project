<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="page-shell">
        <section class="card form-card">
            <h1>Workout Details</h1>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Exercise</th>
                            <th>Sets</th>
                            <th>Reps</th>
                            <th>Weight (kgs)</th>
                            <th>Time (minutes)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>{{ workout.date }}</td>
                            <td>{{ workout.exercise }}</td>
                            <td>{{ workout.sets }}</td>
                            <td>{{ workout.reps }}</td>
                            <td>{{ workout.weight }}</td>
                            <td>{{ workout.time or 'Not provided' }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="actions form-actions">
                <a class="action-link" href="{{ url_for('edit_workout', workout_id=workout_id) }}">Edit Workout</a>
                <button type="button" class="secondary" onclick="window.location.href='/'">
                    Back to Home
                </button>
                <form action="{{ url_for('delete_workout', workout_id=workout_id) }}" method="post" data-exercise="{{ workout.exercise | e }}" onsubmit="return confirm('Delete ' + this.dataset.exercise + ' workout entry?');">
                    <button type="submit" class="danger">Delete Workout</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
